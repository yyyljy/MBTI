services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mbti
      POSTGRES_USER: mbti
      POSTGRES_PASSWORD: mbti
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbti -d mbti"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - mbti_postgres:/var/lib/postgresql/data

volumes:
  mbti_postgres:
